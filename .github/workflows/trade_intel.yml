name: Trade Intelligence Digest

on:
  schedule:
    # Morning digest: 06:00 UTC = 07:00 AM CET / 08:00 AM CEST
    # India is at 11:30 AM IST — full overnight + Indian morning news ready.
    - cron: "0 6 * * *"
    # Afternoon digest: 13:00 UTC = 14:00 PM CET / 15:00 PM CEST
    # India is at 18:30 IST — captures European midday + Indian afternoon news cycle.
    - cron: "0 13 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trade Intelligence pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RECIPIENT_CC: ${{ secrets.RECIPIENT_CC }}
        run: python main.py
